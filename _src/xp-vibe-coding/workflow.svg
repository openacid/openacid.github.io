<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0e8d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e8e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Step 1: IDE 分析 -->
  <g filter="url(#shadow)">
    <rect x="10" y="30" width="120" height="60" rx="8" fill="url(#grad1)" stroke="#88b8c8" stroke-width="1.5"/>
    <text x="70" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a6070">IDE</text>
    <text x="70" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a6070">分析决策</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M135 60 L160 60" stroke="#a0b8c0" stroke-width="2" fill="none"/>
  <polygon points="160,55 172,60 160,65" fill="#a0b8c0"/>

  <!-- Step 2: 语音描述 -->
  <g filter="url(#shadow)">
    <rect x="175" y="30" width="120" height="60" rx="8" fill="url(#grad2)" stroke="#88c088" stroke-width="1.5"/>
    <text x="235" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a6040">语音</text>
    <text x="235" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a6040">描述需求</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M300 60 L325 60" stroke="#a0c0a0" stroke-width="2" fill="none"/>
  <polygon points="325,55 337,60 325,65" fill="#a0c0a0"/>

  <!-- Step 3: AI 生成 -->
  <g filter="url(#shadow)">
    <rect x="340" y="30" width="120" height="60" rx="8" fill="url(#grad3)" stroke="#b088b8" stroke-width="1.5"/>
    <text x="400" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#604060">AI</text>
    <text x="400" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#604060">代码生成</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M465 60 L490 60" stroke="#b0a0b8" stroke-width="2" fill="none"/>
  <polygon points="490,55 502,60 490,65" fill="#b0a0b8"/>

  <!-- Step 4: Review -->
  <g filter="url(#shadow)">
    <rect x="505" y="30" width="120" height="60" rx="8" fill="url(#grad4)" stroke="#c0a880" stroke-width="1.5"/>
    <text x="565" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#605030">tig</text>
    <text x="565" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#605030">逐行 Review</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M630 60 L655 60" stroke="#c0b8a0" stroke-width="2" fill="none"/>
  <polygon points="655,55 667,60 655,65" fill="#c0b8a0"/>

  <!-- Step 5: Git 提交 -->
  <g filter="url(#shadow)">
    <rect x="670" y="30" width="120" height="60" rx="8" fill="url(#grad5)" stroke="#80b8a8" stroke-width="1.5"/>
    <text x="730" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#306050">Git</text>
    <text x="730" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#306050">增量提交</text>
  </g>

  <!-- Loop arrow back -->
  <path d="M730 95 L730 110 L70 110 L70 95" stroke="#c0c8d0" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="65,95 70,83 75,95" fill="#c0c8d0"/>
</svg>
